{% extends "base.html" %}
{% block title %}Register – Armenia Services Marketplace{% endblock %}
{% block content %}
<h1>Register</h1>
<form method="post" action="{% url 'webui:register' %}">
  {% csrf_token %}
  {{ form.as_p }}
  <p><button type="submit">Register</button></p>
</form>
<p><a href="{% url 'webui:login' %}">Already have an account? Log in</a></p>
{% endblock %}
