{% extends "base.html" %}
{% block title %}Log in – Armenia Services Marketplace{% endblock %}
{% block content %}
<h1>Log in</h1>
<form method="post" action="{% url 'webui:login' %}">
  {% csrf_token %}
  {{ form.as_p }}
  <p><button type="submit">Log in</button></p>
</form>
<p><a href="{% url 'webui:register' %}">Register</a></p>
{% endblock %}
